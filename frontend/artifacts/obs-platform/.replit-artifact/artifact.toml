kind = "web"
previewPath = "/"
title = "Observability Platform"
version = "1.0.0"
id = "artifacts/obs-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18204

[services.development]
run = "pnpm --filter @workspace/obs-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obs-platform", "run", "build" ]
publicDir = "artifacts/obs-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18204"
BASE_PATH = "/"
